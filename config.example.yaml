home_assistant:
  url: "http://homeassistant.local:8123"
  token: ""

ui:
  fullscreen: true
  screen_width: 800
  screen_height: 480
  hide_cursor: true
  refresh_interval: 1.0

touch:
  mode: "pygame"
  enable_gestures: true

updates:
  enabled: true
  github_repo: "H-Y-R-O-V-I/hyrovi-touch-panel"
  channel: "stable"
  check_on_boot: true
  boot_delay_seconds: 60
  auto_update: true
  rollback_on_failed_healthcheck: true

entities:
  main_light: "switch.lampe_wohnzimmer"
  temperature: "sensor.tesla_wall_connector_mcu_temperatur"
  humidity: "sensor.solaredge_speicherniveau"

dashboard:
  pages:
    - id: "home"
      label: "Home"
      tiles:
        - id: "main_light"
          type: "entity"
          entity_id: "switch.lampe_wohnzimmer"
          label: "Lampe Wohnzimmer"
          action: "toggle"
          info: "Hauptlicht"
        - id: "temperature"
          type: "sensor"
          entity_id: "sensor.tesla_wall_connector_mcu_temperatur"
          label: "Temperatur"
          action: "none"
          info: "Realer Wert"
        - id: "humidity"
          type: "sensor"
          entity_id: "sensor.solaredge_speicherniveau"
          label: "Luftfeuchtigkeit"
          action: "none"
          info: "Realer Wert"
    - id: "lights"
      label: "Lampen"
      tiles:
        - id: "main_light"
          type: "entity"
          entity_id: "switch.lampe_wohnzimmer"
          label: "Lampe Wohnzimmer"
          action: "toggle"
          info: "Direkter Zugriff"
    - id: "switches"
      label: "Schalter"
      tiles:
        - id: "main_light_switch"
          type: "entity"
          entity_id: "switch.lampe_wohnzimmer"
          label: "Schalter Wohnzimmer"
          action: "toggle"
          info: "Hauptlicht"
    - id: "actions"
      label: "Aktionen"
      tiles:
        - id: "refresh"
          type: "action"
          label: "Neu laden"
          action: "refresh"
          info: "Nur lesen"
    - id: "system"
      label: "System"
      tiles:
        - id: "ha_state"
          type: "info"
          label: "Home Assistant"
          action: "none"
          info: "Verbindungsstatus"

admin:
  pin: ""
